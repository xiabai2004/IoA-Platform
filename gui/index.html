<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoA 分布式网络运维协同平台</title>
<script src="https://unpkg.com/vis-network@9.1.6/standalone/umd/vis-network.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b1120;--panel:#111827;--border:#1e3a5f;--accent:#38bdf8;
  --green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--purple:#a855f7;
  --text:#e2e8f0;--muted:#64748b;
}
body{font-family:'Segoe UI','PingFang SC',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── Header ── */
.header{background:linear-gradient(90deg,#0f172a 0%,#1e3a5f 100%);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.header-left{display:flex;align-items:center;gap:12px}
.header h1{font-size:1em;font-weight:700;background:linear-gradient(90deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-right{display:flex;align-items:center;gap:12px}
#wsDot{width:8px;height:8px;border-radius:50%;display:inline-block}
#wsDot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
#wsDot.off{background:var(--red);box-shadow:0 0 6px var(--red)}
#clock{font-size:0.75em;color:var(--muted);font-variant-numeric:tabular-nums}

/* ── Command Bar ── */
.command-bar{background:var(--panel);padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.cmd-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.cmd-input{flex:1;min-width:200px;padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:#0f172a;color:var(--text);font-size:0.85em;outline:none;transition:border 0.2s}
.cmd-input:focus{border-color:var(--accent)}
.btn{padding:7px 14px;border-radius:8px;border:1px solid transparent;font-size:0.8em;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.btn-primary{background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;border-color:#1d4ed8}
.btn-primary:hover{background:linear-gradient(135deg,#1e40af,#1d4ed8);box-shadow:0 0 12px #1d4ed844}
.btn-danger{background:linear-gradient(135deg,#991b1b,#dc2626);color:#fca5a5;border-color:#991b1b}
.btn-danger:hover{box-shadow:0 0 12px #dc262644}
.btn-success{background:linear-gradient(135deg,#14532d,#15803d);color:#86efac;border-color:#14532d}
.btn-success:hover{box-shadow:0 0 12px #22c55e44}
.btn-purple{background:linear-gradient(135deg,#581c87,#7c3aed);color:#c4b5fd;border-color:#581c87}
.btn-purple:hover{box-shadow:0 0 12px #a855f744}
.btn-ghost{background:transparent;color:var(--text);border-color:var(--border)}
.btn-ghost:hover{background:#1e293b}
select{padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:#0f172a;color:var(--text);font-size:0.8em;cursor:pointer}
.cmd-status{font-size:0.75em;color:var(--muted);margin-top:4px;min-height:18px}

/* ── Main Layout ── */
.main{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px;flex:1;overflow:hidden;min-height:0}

/* ── Panels ── */
.panel{background:var(--panel);border-radius:10px;padding:12px;border:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;min-height:0}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--purple),transparent);border-radius:10px 10px 0 0}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-shrink:0}
.panel-title{font-size:0.75em;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;display:flex;align-items:center;gap:6px}
.panel-title .material-symbols-outlined{font-size:1em;color:var(--accent)}
.panel-badge{background:var(--accent);color:#0f172a;padding:1px 8px;border-radius:10px;font-size:0.7em;font-weight:700}
.panel-content{flex:1;overflow-y:auto;min-height:0}

/* ── Left Column: Monitor ── */
.left-col{display:flex;flex-direction:column;gap:10px;overflow:hidden}

/* Topology */
#topo{flex:1;min-height:200px;border-radius:8px;background:#0a0f1e;border:1px solid var(--border);overflow:hidden}

/* Metrics Cards */
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.metric-card{background:#0f172a;border-radius:8px;padding:10px;border:1px solid #1e293b;transition:all 0.3s}
.metric-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.metric-card.warn{border-color:var(--yellow);background:#1a1500}
.metric-card.critical{border-color:var(--red);background:#1a0000}
.metric-domain{font-size:0.7em;color:var(--accent);font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.metric-domain .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.metric-row{display:flex;justify-content:space-between;align-items:baseline;margin-top:4px}
.metric-label{font-size:0.65em;color:var(--muted)}
.metric-value{font-size:1.1em;font-weight:800;font-variant-numeric:tabular-nums}
.metric-value.ok{color:var(--green)}.metric-value.warn{color:var(--yellow)}.metric-value.crit{color:var(--red)}

/* Chart */
.chart-container{height:180px;position:relative;flex-shrink:0}

/* ── Right Column: Control ── */
.right-col{display:flex;flex-direction:column;gap:10px;overflow:hidden}

/* Agent Table */
.agent-table{width:100%;border-collapse:collapse;font-size:0.75em}
.agent-table th{color:var(--muted);font-weight:500;text-align:left;padding:4px 6px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel)}
.agent-table td{padding:4px 6px;border-bottom:1px solid #111827}
.agent-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px}
.agent-dot.up{background:var(--green);box-shadow:0 0 4px var(--green)}.agent-dot.down{background:var(--red)}
.agent-cap{display:inline-block;padding:1px 6px;border-radius:4px;font-size:0.85em;background:#1e293b;color:var(--accent);margin-right:2px}

/* DAG List */
.dag-item{background:#0f172a;border-radius:8px;padding:8px 10px;margin-bottom:6px;border:1px solid #1e293b;cursor:pointer;transition:all 0.2s}
.dag-item:hover{border-color:var(--accent);background:#111d2e}
.dag-item.active{border-color:var(--green)}
.dag-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.dag-id{font-size:0.75em;font-weight:600;color:var(--accent)}
.dag-status{font-size:0.65em;padding:2px 8px;border-radius:10px;font-weight:600}
.dag-status.pending{background:#1e293b;color:#94a3b8}.dag-status.running{background:#1d4ed8;color:#93c5fd;animation:pulse 1.2s ease-in-out infinite}
.dag-status.completed{background:#14532d;color:#86efac}.dag-status.failed{background:#7f1d1d;color:#fca5a5}
.dag-desc{font-size:0.7em;color:var(--muted)}
.dag-nodes{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.dag-node{background:#111827;border-radius:6px;padding:4px 8px;font-size:0.65em;border:1px solid #1e3a5f;transition:all 0.3s}
.dag-node.running{border-color:var(--accent);box-shadow:0 0 8px #38bdf844;animation:pulse 1.2s ease-in-out infinite}
.dag-node.completed{border-color:var(--green)}.dag-node.failed{border-color:var(--red)}
.dag-node-name{font-weight:600;color:var(--text)}.dag-node-agent{color:var(--muted);font-size:0.9em}
.dag-arrow{color:#334155;font-size:0.8em;align-self:center}

/* Message Flow */
.msg-flow{display:flex;flex-direction:column;gap:3px}
.msg-item{display:flex;gap:6px;font-size:0.7em;padding:5px 8px;border-radius:6px;background:#0f172a;border:1px solid #1e293b;align-items:center;transition:all 0.2s}
.msg-item:hover{border-color:var(--accent);background:#111d2e}
.msg-type{min-width:50px;font-weight:600;font-size:0.9em}
.msg-type.user{color:#38bdf8}.msg-type.task{color:#f59e0b}.msg-type.result{color:#22c55e}.msg-type.report{color:#a855f7}
.msg-arrow{color:#475569;font-size:0.8em}
.msg-from,.msg-to{font-weight:600;min-width:70px;font-size:0.9em}
.msg-from{color:var(--accent)}.msg-to{color:var(--purple)}
.msg-time{color:#334155;font-size:0.85em;margin-left:auto}
.msg-filter-bar{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap}
.msg-filter{padding:3px 8px;border-radius:6px;font-size:0.7em;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--muted);transition:all 0.15s}
.msg-filter:hover{background:#1e293b;color:var(--text)}
.msg-filter.active{background:#1e3a5f;color:var(--accent);border-color:var(--accent)}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.7em;font-weight:600}
.badge.active{background:#14532d;color:#86efac}.badge.offline{background:#7f1d1d;color:#fca5a5}

/* ── Verdict ── */
.verdict{display:inline-block;padding:4px 12px;border-radius:8px;font-size:0.8em;font-weight:600}
.verdict.pass{background:#14532d;color:#86efac}.verdict.retry{background:#78350f;color:#fbbf24}.verdict.fail{background:#7f1d1d;color:#fca5a5}

/* ── Toast ── */
#toast{position:fixed;top:50px;right:16px;z-index:999;display:flex;flex-direction:column;gap:6px}
.toast-item{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:0.78em;animation:slideIn 0.3s ease;max-width:320px}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}

/* ── Material Icons ── */
.material-symbols-outlined{font-variation-settings:'FILL'0,'wght'400,'GRAD'0,'opsz'20;color:var(--muted);user-select:none;font-size:1em}

</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <span class="material-symbols-outlined" style="color:var(--accent);font-size:1.3em">public</span>
    <h1>IoA 分布式网络运维协同平台</h1>
  </div>
  <div class="header-right">
    <span id="wsDot" class="off"></span>
    <span id="wsLabel" style="font-size:0.7em;color:var(--muted)">未连接</span>
    <span id="clock"></span>
  </div>
</div>

<!-- Command Bar -->
<div class="command-bar">
  <div class="cmd-row">
    <input id="nlInput" class="cmd-input" value="华东地区网络延迟异常，请全流程诊断修复" placeholder="输入自然语言运维指令...">
    <button class="btn btn-primary" onclick="sendNL()">
      <span class="material-symbols-outlined">play_arrow</span> 执行
    </button>
    <button class="btn btn-danger" onclick="demoFault()">
      <span class="material-symbols-outlined">bolt</span> 注入故障
    </button>
    <select id="faultType">
      <option value="link_congestion">链路拥塞</option>
      <option value="link_outage">链路中断</option>
      <option value="cpu_overload">CPU过载</option>
      <option value="ddos">DDoS攻击</option>
      <option value="misconfig">配置错误</option>
      <option value="device_failure">设备故障</option>
    </select>
    <select id="faultDomain">
      <option value="east-china">华东</option>
      <option value="north-china">华北</option>
      <option value="south-china">华南</option>
      <option value="west-china">西南</option>
    </select>
    <button class="btn btn-success" onclick="clearAllFaults()">
      <span class="material-symbols-outlined">delete_sweep</span> 清除故障
    </button>
    <button class="btn btn-purple" onclick="runDemo()">
      <span class="material-symbols-outlined">play_circle</span> 一键演示
    </button>
    <button class="btn btn-danger" onclick="runMultiFaultDemo()" title="多域同时故障演示">
      <span class="material-symbols-outlined">warning</span> 复合故障
    </button>
  </div>
  <div id="cmdStatus" class="cmd-status"></div>
</div>

<!-- Main Content -->
<div class="main">
  <!-- Left Column: Monitor -->
  <div class="left-col">
    <!-- Topology -->
    <div class="panel" style="flex:1.2">
      <div class="panel-header">
        <div class="panel-title">
          <span class="material-symbols-outlined">hub</span> 网络拓扑实时状态
        </div>
      </div>
      <div id="topo"></div>
    </div>

    <!-- Metrics -->
    <div class="panel" style="flex:1">
      <div class="panel-header">
        <div class="panel-title">
          <span class="material-symbols-outlined">monitoring</span> 实时指标
        </div>
        <span id="metricsTime" style="font-size:0.7em;color:var(--muted)"></span>
      </div>
      <div id="metricsPanel" class="metrics-grid panel-content"></div>
    </div>

    <!-- Chart -->
    <div class="panel" style="flex:0.8">
      <div class="panel-header">
        <div class="panel-title">
          <span class="material-symbols-outlined">show_chart</span> 延迟趋势
          <span style="font-size:0.8em;color:var(--muted)">(最近60秒)</span>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="metricsChart"></canvas>
      </div>
    </div>
  </div>

  <!-- Right Column: Control -->
  <div class="right-col">
    <!-- Agents -->
    <div class="panel" style="flex:0.8">
      <div class="panel-header">
        <div class="panel-title">
          <span class="material-symbols-outlined">precision_manufacturing</span> Agent 集群
        </div>
        <span id="agentCount" class="panel-badge"></span>
      </div>
      <div id="agentTable" class="panel-content"></div>
    </div>

    <!-- DAG List -->
    <div class="panel" style="flex:1">
      <div class="panel-header">
        <div class="panel-title">
          <span class="material-symbols-outlined">account_tree</span> DAG 执行记录
        </div>
        <span id="dagCount" class="panel-badge"></span>
      </div>
      <div id="dagList" class="panel-content"></div>
    </div>

    <!-- Message Flow -->
    <div class="panel" style="flex:1.2">
      <div class="panel-header">
        <div class="panel-title">
          <span class="material-symbols-outlined">swap_horiz</span> IoAP 消息流
        </div>
        <span id="msgCount" class="panel-badge"></span>
      </div>
      <div class="msg-filter-bar">
        <button class="msg-filter active" onclick="filterMsgs('all',this)">全部</button>
        <button class="msg-filter" onclick="filterMsgs('user',this)" style="color:#38bdf8">用户</button>
        <button class="msg-filter" onclick="filterMsgs('task',this)" style="color:#f59e0b">任务</button>
        <button class="msg-filter" onclick="filterMsgs('result',this)" style="color:#22c55e">结果</button>
        <button class="msg-filter" onclick="filterMsgs('report',this)" style="color:#a855f7">报告</button>
      </div>
      <div id="msgFlow" class="msg-flow panel-content"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API=window.location.origin||'http://127.0.0.1:8000';
const SIM=API.replace(/:\d+$/,'') + ':8001' || 'http://127.0.0.1:8001';
const AUTH_TOKEN='ioa-dev-only-insecure-key';const AUTH={'Authorization':'Bearer '+AUTH_TOKEN};
const DOMAINS=['east-china','north-china','south-china','west-china'];
const DOMAIN_CN={'east-china':'华东','north-china':'华北','south-china':'华南','west-china':'西南'};
const COLORS={'east-china':'#3b82f6','north-china':'#22c55e','south-china':'#f59e0b','west-china':'#a855f7'};

// XSS escape
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML;}

let expandedDags={}, dagData={}, chart=null, topoNetwork=null;
let metricsHistory={}; for(const d of DOMAINS) metricsHistory[d]={latency:[],loss:[],bw:[],labels:[]};
const MAX_H=60;
let msgBuffer=[];
let currentFilter='all';

/* ── Helpers ── */
function $(id){return document.getElementById(id)}
function log(msg){$('cmdStatus').innerHTML=`<span style="color:#475569">[${new Date().toLocaleTimeString()}]</span> ${msg}`;}
function toast(msg,color='var(--accent)'){
  const el=document.createElement('div');el.className='toast-item';el.style.borderLeft=`3px solid ${color}`;
  el.textContent=msg;$('toast').prepend(el);setTimeout(()=>el.remove(),4000);
}
async function getJSON(url){
  const r=await fetch(url,{headers:AUTH});if(!r.ok)throw Error(r.status);return r.json();
}
async function postJSON(url,body){
  return fetch(url,{method:'POST',headers:{'Content-Type':'application/json',...AUTH},body:JSON.stringify(body)});
}

/* ── NL / Fault ── */
async function sendNL(){
  const txt=$('nlInput').value.trim();if(!txt)return;
  log(`<span class="material-symbols-outlined" style="font-size:0.9em;vertical-align:middle">progress_activity</span> 发送指令: ${esc(txt)}`);
  try{
    await postJSON(`${API}/messages`,{
      msg_id:'nl-'+Date.now(),from_agent:'gui',to_agent:'orchestrator-agent',
      intent:{type:'user',description:txt,priority:'high'},
      payload:{params:{message:txt}},correlation_id:'gui-'+Date.now(),ts_ms:Date.now()
    });
    log(`<span class="material-symbols-outlined" style="font-size:0.9em;vertical-align:middle;color:var(--green)">check_circle</span> 已路由到 orchestrator-agent`);
    toast('指令已发送','var(--green)');
  }catch(e){
    log(`<span class="material-symbols-outlined" style="font-size:0.9em;vertical-align:middle;color:var(--red)">cancel</span> ${esc(e.message)}`);
    toast('发送失败','var(--red)');
  }
}

async function demoFault(){
  const ft=$('faultType').value, dom=$('faultDomain').value;
  try{
    const r=await fetch(`${SIM}/simulator/fault/inject?fault_type=${ft}&target=${dom}`,{method:'POST'});
    if(!r.ok)throw Error(r.status);
    const d=await r.json();
    log(`<span class="material-symbols-outlined" style="font-size:1em;vertical-align:middle;color:var(--yellow)">bolt</span> 已注入 ${ft} → ${dom}`);
    toast(`故障注入: ${ft} @ ${dom}`,'var(--yellow)');
  }catch(e){
    log(`<span class="material-symbols-outlined" style="font-size:0.9em;vertical-align:middle;color:var(--red)">cancel</span> ${esc(e.message)}`);
  }
}

async function clearAllFaults(){
  try{
    await getJSON(`${SIM}/simulator/fault/clear_all`);
    log('<span class="material-symbols-outlined" style="font-size:1em;vertical-align:middle;color:var(--green)">delete_sweep</span> 已清除所有故障');
    toast('故障已清除','var(--green)');
  }catch(e){}
}

async function runDemo(){
  toast('一键演示启动: 清除故障→注入→执行→报告','var(--purple)');
  await clearAllFaults();
  await new Promise(r=>setTimeout(r,800));
  $('faultType').value='link_congestion';
  $('faultDomain').value='east-china';
  await demoFault();
  await new Promise(r=>setTimeout(r,1000));
  $('nlInput').value='华东地区网络延迟异常，请全流程诊断修复';
  await sendNL();
}

// 复合故障场景演示
async function runMultiFaultDemo(){
  toast('复合故障演示: 多域同时故障→协同修复','var(--red)');
  await clearAllFaults();
  await new Promise(r=>setTimeout(r,500));

  // 注入华东链路拥塞
  $('faultType').value='link_congestion';
  $('faultDomain').value='east-china';
  await demoFault();
  await new Promise(r=>setTimeout(r,300));

  // 注入华北 DDoS 攻击
  $('faultType').value='ddos';
  $('faultDomain').value='north-china';
  await demoFault();
  await new Promise(r=>setTimeout(r,300));

  // 注入华南配置错误
  $('faultType').value='misconfig';
  $('faultDomain').value='south-china';
  await demoFault();
  await new Promise(r=>setTimeout(r,500));

  // 发送修复指令
  $('nlInput').value='全网多域故障，请启动全域健康检查和修复';
  await sendNL();
}

/* ── Topology ── */
function initTopo(){
  const nodes=[],edges=[];
  nodes.push({id:'Core',label:'Core-Router',shape:'box',size:30,
    color:{background:'#1e3a5f',border:'#38bdf8'},font:{color:'#e2e8f0',size:13,weight:'bold'}});
  for(const d of DOMAINS){
    const eid='Edge-'+d;
    const lbl=DOMAIN_CN[d]+' Edge';
    const color=COLORS[d];
    nodes.push({id:eid,label:lbl,shape:'box',size:22,
      color:{background:color,border:color},font:{color:'#e2e8f0',size:11}});
    edges.push({from:'Core',to:eid,arrows:'to',color:{color:color,opacity:0.5},width:2.5,arrowStrikethrough:false});
    for(let i=1;i<=3;i++){
      const sid='srv-'+d+'-'+i;
      nodes.push({id:sid,label:'Srv'+i,shape:'dot',size:10,
        color:{background:color+'55',border:color},font:{color:'#64748b',size:8}});
      edges.push({from:eid,to:sid,color:{color:'#1e293b'},width:1,dashes:[4,4]});
    }
  }
  topoNetwork=new vis.Network($('topo'),{nodes:new vis.DataSet(nodes),edges:new vis.DataSet(edges)},{
    physics:{solver:'barnesHut',gravitationalConstant:-1800,springLength:120,stabilization:{iterations:120}},
    interaction:{hover:true,zoomView:true,dragView:true},
    edges:{arrows:{to:{enabled:true,scaleFactor:0.6}},smooth:{type:'curvedCW',roundness:0.2}}
  });
}

/* ── Metrics ── */
function level(v,lo,hi){return v>=hi?'crit':v>=lo?'warn':'ok';}

function updateMetrics(data){
  const m=data.metrics||data;
  let html='';
  for(const d of DOMAINS){
    const r=m[d];if(!r)continue;
    const lat=r.latency_ms||0, loss=(r.packet_loss||0)*100, bw=(r.bandwidth_util||0)*100;
    const ll=level(lat,50,100), bl=level(bw,70,90), lol=level(loss,1,5);
    const worst=ll==='crit'||bl==='crit'||lol==='crit'?'critical':(ll==='warn'||bl==='warn'||lol==='warn'?'warn':'');
    html+=`<div class="metric-card ${worst}">
      <div class="metric-domain"><span class="dot" style="background:${COLORS[d]}"></span>${DOMAIN_CN[d]}</div>
      <div class="metric-row"><span class="metric-label">延迟</span><span class="metric-value ${ll}">${lat.toFixed(1)}ms</span></div>
      <div class="metric-row"><span class="metric-label">丢包</span><span class="metric-value ${lol}">${loss.toFixed(2)}%</span></div>
      <div class="metric-row"><span class="metric-label">带宽</span><span class="metric-value ${bl}">${bw.toFixed(1)}%</span></div>
    </div>`;
    // History
    const h=metricsHistory[d];
    h.latency.push(lat);h.loss.push(loss);h.bw.push(bw);
    h.labels.push(new Date().toLocaleTimeString());
    if(h.latency.length>MAX_H){h.latency.shift();h.loss.shift();h.bw.shift();h.labels.shift();}
  }
  $('metricsPanel').innerHTML=html;
  $('metricsTime').textContent=new Date().toLocaleTimeString();
  updateChart();
}

/* ── Chart ── */
function initChart(){
  const ctx=$('metricsChart').getContext('2d');
  chart=new Chart(ctx,{
    type:'line',
    data:{labels:[],datasets:DOMAINS.map(d=>({label:DOMAIN_CN[d],data:[],borderColor:COLORS[d],backgroundColor:COLORS[d]+'22',borderWidth:2,pointRadius:0,tension:0.3,fill:true}))},
    options:{responsive:true,maintainAspectRatio:false,animation:{duration:300},
      plugins:{legend:{display:true,position:'top',labels:{color:'#64748b',font:{size:10},boxWidth:12,padding:8}}},
      scales:{x:{display:false},y:{beginAtZero:true,grid:{color:'#1e293b'},ticks:{color:'#64748b',font:{size:10}}}}
    }
  });
}

function updateChart(){
  if(!chart)return;
  chart.data.labels=metricsHistory[DOMAINS[0]].labels;
  DOMAINS.forEach((d,i)=>{chart.data.datasets[i].data=metricsHistory[d].latency;});
  chart.update('none');
}

/* ── Agents ── */
async function loadAgents(){
  try{
    const d=await getJSON(`${API}/registry/agents`);
    const agents=d.agents||[];
    $('agentCount').textContent=agents.length;
    let html='<table class="agent-table"><tr><th>状态</th><th>ID</th><th>域</th><th>能力</th><th>负载</th></tr>';
    for(const a of agents){
      const st=a.status==='active'?'up':'down';
      // Parse capabilities - might be string or array
      let caps=[];
      try{
        caps=typeof a.capabilities==='string'?JSON.parse(a.capabilities):(a.capabilities||[]);
      }catch(e){caps=[];}
      const capsHtml=caps.map(c=>`<span class="agent-cap">${esc(c)}</span>`).join('');
      const load=((a.load||0)*100).toFixed(0);
      html+=`<tr><td><span class="agent-dot ${st}"></span>${st==='up'?'在线':'离线'}</td>
        <td>${esc(a.agent_id)}</td><td>${esc(DOMAIN_CN[a.domain]||a.domain)}</td>
        <td>${capsHtml}</td><td>${load}%</td></tr>`;
    }
    html+='</table>';
    $('agentTable').innerHTML=html;
  }catch(e){console.error('loadAgents error:',e);}
}

/* ── DAG ── */
async function loadDags(){
  try{
    const d=await getJSON(`${API}/dag?limit=20`);
    const dags=d.dags||[];
    $('dagCount').textContent=dags.length;
    dagData={};
    for(const g of dags){
      try{
        const detail=await getJSON(`${API}/dag/${g.dag_id}`);
        dagData[g.dag_id]=detail;
      }catch(e){}
    }
    renderDags(dags);
  }catch(e){}
}

function renderDags(dags){
  let html='';
  for(const g of dags){
    const st=g.status||'pending';
    const expanded=expandedDags[g.dag_id];
    const detail=dagData[g.dag_id];
    const nodes=detail?detail.nodes||[]:[];
    html+=`<div class="dag-item ${expanded?'active':''}" onclick="toggleDag('${esc(g.dag_id)}')">
      <div class="dag-header">
        <span class="dag-id">${esc(g.dag_id)}</span>
        <span class="dag-status ${st}">${st}</span>
      </div>
      <div class="dag-desc">${esc(g.description||'')}</div>`;
    if(expanded&&nodes.length){
      html+='<div class="dag-nodes">';
      for(let i=0;i<nodes.length;i++){
        const n=nodes[i];
        const nst=n.status||'pending';
        html+=`<div class="dag-node ${nst}">
          <div class="dag-node-name">${esc(n.node_id)}</div>
          <div class="dag-node-agent">${esc(n.assigned_agent||'-')}</div>
        </div>`;
        if(i<nodes.length-1)html+='<span class="dag-arrow">→</span>';
      }
      html+='</div>';
    }
    html+='</div>';
  }
  $('dagList').innerHTML=html||'<div style="color:var(--muted);font-size:0.8em;padding:10px">暂无 DAG 记录</div>';
}

function toggleDag(id){
  expandedDags[id]=!expandedDags[id];
  loadDags();
}

/* ── Messages ── */
async function loadMessages(){
  try{
    const d=await getJSON(`${API}/messages?limit=50`);
    const msgs=d.messages||[];
    msgBuffer=msgs.reverse();
    renderMessages();
  }catch(e){}
}

function renderMessages(){
  let html='';
  const filtered=currentFilter==='all'?msgBuffer:msgBuffer.filter(m=>m.intent_type===currentFilter);
  for(const m of filtered.slice(-30)){
    const tp=m.intent_type||'task';
    html+=`<div class="msg-item">
      <span class="msg-type ${tp}">${tp}</span>
      <span class="msg-from">${esc(m.from_agent||'')}</span>
      <span class="msg-arrow">→</span>
      <span class="msg-to">${esc(m.to_agent||'*')}</span>
      <span class="msg-time">${m.ts_ms?new Date(m.ts_ms).toLocaleTimeString():''}</span>
    </div>`;
  }
  $('msgFlow').innerHTML=html||'<div style="color:var(--muted);font-size:0.8em;padding:10px">暂无消息</div>';
  $('msgCount').textContent=filtered.length;
}

function filterMsgs(type,el){
  currentFilter=type;
  document.querySelectorAll('.msg-filter').forEach(b=>b.classList.remove('active'));
  if(el)el.classList.add('active');
  renderMessages();
}

/* ── WebSocket ── */
function connectWS(){
  // 传递 token 进行认证
  const wsUrl=`${API.replace('http','ws')}/ws/dashboard?token=${AUTH_TOKEN}`;
  const ws=new WebSocket(wsUrl);
  ws.onopen=()=>{
    $('wsDot').className='ok';
    $('wsLabel').textContent='已连接';
    toast('WebSocket 已连接','var(--green)');
  };
  ws.onmessage=(e)=>{
    try{
      const d=JSON.parse(e.data);
      if(d.type==='dashboard_ping'){
        // Heartbeat
      }
    }catch(err){}
  };
  ws.onclose=()=>{
    $('wsDot').className='off';
    $('wsLabel').textContent='未连接';
    setTimeout(connectWS,3000);
  };
  ws.onerror=()=>ws.close();
}

/* ── Simulator WS ── */
function connectSimWS(){
  const ws=new WebSocket(`${API.replace('http','ws').replace(/:\d+$/,':8001')}/simulator/ws`);
  ws.onopen=()=>console.log('Simulator WS connected');
  ws.onmessage=(e)=>{
    try{
      const d=JSON.parse(e.data);
      if(d.type==='metrics'&&d.data){
        updateMetrics(d.data.regions||d.data);
      }
    }catch(err){}
  };
  ws.onclose=()=>setTimeout(connectSimWS,3000);
  ws.onerror=()=>ws.close();
}

/* ── Clock ── */
function updateClock(){
  $('clock').textContent=new Date().toLocaleTimeString();
}

/* ── Init ── */
async function init(){
  initTopo();
  initChart();
  updateClock();
  setInterval(updateClock,1000);
  setInterval(loadAgents,10000);
  setInterval(loadDags,5000);
  setInterval(loadMessages,3000);

  await Promise.all([loadAgents(),loadDags(),loadMessages()]);
  connectWS();
  connectSimWS();
}

init();
</script>
